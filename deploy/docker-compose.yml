version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: testforge
    ports:
      - "8000:8000"
    volumes:
      - testcase-data:/home/appuser/.TestCaseAI
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  testcase-data:
